apiVersion: v1
kind: Pod
metadata:
  name: emptydir-pod
  namespace: learning
  labels:
    app: emptydir-pod
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: app-storage
          mountPath: /data
  volumes:
    - name: app-storage
      emptyDir: {}
