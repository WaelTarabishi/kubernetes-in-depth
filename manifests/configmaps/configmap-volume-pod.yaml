apiVersion: v1
kind: Pod
metadata:
  name: configmap-volume-pod
  namespace: learning
  labels:
    app: configmap-volume-pod
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command: ["sh", "-c", "sleep 3600"]
      volumeMounts:
        - name: app-config-volume
          mountPath: /etc/app-config
  volumes:
    - name: app-config-volume
      configMap:
        name: app-config
